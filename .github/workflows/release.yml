name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: ${{ matrix.runner }}
    environment: release

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Validate signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Import Apple Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Inspect signing identities
        run: |
          security find-identity -v -p codesigning
          security list-keychains

      - name: Package for macOS
        env:
          DEBUG: electron-builder,electron-notarize*
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder --config ./scripts/electron-builder-ci-mac-config.js --mac --${{ matrix.arch }} --publish never

      - name: Resolve mac artifacts
        id: mac-artifacts
        run: |
          APP_PATH="$(find dist -maxdepth 2 -type d -name '20x.app' | head -n 1)"
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name '20x-*-${{ matrix.arch }}.zip' | head -n 1)"
          DMG_PATH="$(find dist -maxdepth 1 -type f -name '20x-*-${{ matrix.arch }}.dmg' | head -n 1)"

          test -n "$APP_PATH"
          test -f "$ZIP_PATH"
          test -f "$DMG_PATH"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Inspect packaged outputs
        run: |
          ls -lah dist
          ls -lah "${{ steps.mac-artifacts.outputs.app_path }}"
          echo "ZIP: ${{ steps.mac-artifacts.outputs.zip_path }}"
          echo "DMG: ${{ steps.mac-artifacts.outputs.dmg_path }}"

      - name: Notarize mac ZIP and staple app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.mac-artifacts.outputs.zip_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ steps.mac-artifacts.outputs.app_path }}"
          xcrun stapler validate "${{ steps.mac-artifacts.outputs.app_path }}"
          spctl --assess --type execute --verbose=4 "${{ steps.mac-artifacts.outputs.app_path }}"

      - name: Notarize and staple mac DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.mac-artifacts.outputs.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ steps.mac-artifacts.outputs.dmg_path }}"
          xcrun stapler validate "${{ steps.mac-artifacts.outputs.dmg_path }}"

      - name: Rename arch-specific update manifest
        run: cp dist/latest-mac.yml dist/latest-mac-${{ matrix.arch }}.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac-${{ matrix.arch }}.yml

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package for Windows
        run: pnpm exec electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  build-linux:
    runs-on: ubicloud-standard-2

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package for Linux
        run: pnpm exec electron-builder --linux --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.AppImage
            dist/latest-linux.yml

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubicloud-standard-2
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge mac update manifests
        working-directory: artifacts
        run: |
          # Combine arm64 + x64 latest-mac manifests into one latest-mac.yml
          if [ -f latest-mac-arm64.yml ] && [ -f latest-mac-x64.yml ]; then
            python3 << 'EOF'
          import re

          def get_files_block(text):
              """Extract indented file entries from under 'files:' key."""
              m = re.search(r"^files:\n((?:  .+\n)+)", text, re.MULTILINE)
              return m.group(1) if m else ""

          arm64 = open("latest-mac-arm64.yml").read()
          x64 = open("latest-mac-x64.yml").read()
          x64_files = get_files_block(x64)

          # Append x64 file entries into arm64's files block
          merged = re.sub(
              r"(^files:\n(?:  .+\n)+)",
              lambda m: m.group(0) + x64_files,
              arm64, count=1, flags=re.MULTILINE
          )
          open("latest-mac.yml", "w").write(merged)
          print("Merged latest-mac.yml")
          EOF
            rm -f latest-mac-arm64.yml latest-mac-x64.yml
          elif [ -f latest-mac-arm64.yml ]; then
            mv latest-mac-arm64.yml latest-mac.yml
          elif [ -f latest-mac-x64.yml ]; then
            mv latest-mac-x64.yml latest-mac.yml
          fi
          echo "--- latest-mac.yml ---"
          cat latest-mac.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
